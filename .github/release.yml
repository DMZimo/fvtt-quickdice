changelog:
  exclude:
    authors:
      - github-actions[bot]
      - dependabot[bot]
    labels:
      - skip-changelog

  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Maintenance
      labels:
        - chore
        - ci
        - dependencies
