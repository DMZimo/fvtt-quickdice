name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to publish or republish
        required: true
        type: string
      draft:
        description: Create the GitHub release as a draft
        required: false
        default: false
        type: boolean
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Biome checks
        run: npm run check

      - name: Resolve release metadata
        id: release
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION=$(node -p "require('./src/module.json').version")
          EXPECTED_TAG="v${VERSION}"

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tags must look like v1.2.3 or v1.2.3-rc.1. Received $RELEASE_TAG"
            exit 1
          fi

          if [[ "$RELEASE_TAG" != "$EXPECTED_TAG" ]]; then
            echo "::error::Tag $RELEASE_TAG does not match src/module.json version $EXPECTED_TAG"
            exit 1
          fi

          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package module
        run: |
          rm -rf release-build module.json quickdice.zip quickdice.zip.sha256
          mkdir release-build
          cp -R src/. release-build/
          (
            cd release-build
            zip -r ../quickdice.zip . -x ".*"
          )
          cp release-build/module.json ./module.json
          sha256sum quickdice.zip > quickdice.zip.sha256

      - name: Build release notes
        id: notes
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          BODY=$(git tag -l --format='%(contents:body)' "$TAG")
          if [[ -z "$BODY" ]]; then
            BODY=$(git log -1 --format='%b' "$TAG")
          fi
          if [[ -n "$BODY" ]]; then
            {
              echo "body<<GH_RELEASE_EOF"
              echo "$BODY"
              printf '\n**Full Changelog**: '
              echo "https://github.com/$GITHUB_REPOSITORY/compare/$(git describe --tags --abbrev=0 "${TAG}^")...${TAG}"
              echo "GH_RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          NOTES: ${{ steps.notes.outputs.body }}
        run: |
          FLAGS=(--verify-tag)
          if [[ -n "$NOTES" ]]; then
            FLAGS+=(--notes "$NOTES")
          else
            FLAGS+=(--generate-notes)
          fi
          [[ "$DRAFT" == "true" ]] && FLAGS+=(--draft)
          [[ "$PRERELEASE" == "true" ]] && FLAGS+=(--prerelease)
          gh release create "$TAG" "${FLAGS[@]}" \
            quickdice.zip \
            module.json \
            quickdice.zip.sha256
